<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>通勤ルート検索</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi6YCa5YukIOODq+ODvOODiOaknOe0oiIsInNob3J0X25hbWUiOiLpgJrli6Tmo5zntKIiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzFhMWEyZSIsInRoZW1lX2NvbG9yIjoiIzY0NmNmZiJ9">
<meta name="theme-color" content="#646cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ========== CSS Reset & 基础样式 ========== */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --card-hover: #1a2744;
  --accent: #646cff;
  --accent2: #a78bfa;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --red: #f87171;
  --orange: #fb923c;
  --green: #4ade80;
  --border: #334155;
  --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ========== 顶部栏 ========== */
.header {
  position: sticky; top:0; z-index:100;
  background: rgba(26,26,46,0.95);
  backdrop-filter: blur(10px);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; text-align:center; margin-bottom:10px; }
.header .now { text-align:center; font-size:13px; color:var(--text2); margin-bottom:10px; }

/* 方向切换 */
.dir-toggle {
  display:flex; gap:0; border-radius:8px; overflow:hidden;
  border: 1px solid var(--border); margin-bottom:10px;
}
.dir-btn {
  flex:1; padding:10px; text-align:center; font-size:15px; font-weight:600;
  background: var(--card); color: var(--text2);
  border:none; cursor:pointer; transition: all 0.2s;
}
.dir-btn.active { background: var(--accent); color:#fff; }

/* 查询按钮 */
.search-btn {
  width:100%; padding:12px; border:none; border-radius:8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff; font-size:16px; font-weight:700; cursor:pointer;
  transition: transform 0.1s;
}
.search-btn:active { transform: scale(0.97); }

/* ========== 结果区域 ========== */
.results { padding: 12px 16px; }
.results .hint { text-align:center; color:var(--text2); padding:40px 0; font-size:14px; }

/* 方案卡片 */
.plan-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px;
  border: 1px solid var(--border); transition: border-color 0.2s;
}
.plan-card:first-child { border-color: var(--accent); }
.plan-top {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom: 10px; padding-bottom:10px; border-bottom:1px solid var(--border);
}
.plan-times { font-size: 22px; font-weight:700; }
.plan-times span { color: var(--text2); font-size:14px; font-weight:400; margin: 0 6px; }
.plan-meta { text-align:right; }
.plan-meta .total { font-size:13px; color:var(--accent2); font-weight:600; }
.plan-meta .countdown { font-size:12px; color:var(--text2); margin-top:2px; }

/* 段详情 */
.leg {
  display:flex; gap:10px; margin-bottom:8px; position:relative;
  padding-left: 18px;
}
.leg::before {
  content:''; position:absolute; left:6px; top:8px; bottom:-8px;
  width:2px; background: var(--border);
}
.leg:last-of-type::before { display:none; }
.leg-dot {
  position:absolute; left:2px; top:6px;
  width:10px; height:10px; border-radius:50%; background: var(--accent);
}
.leg-info { flex:1; }
.leg-line {
  font-size:12px; color:var(--accent2); font-weight:600;
  margin-bottom:2px;
}
.leg-stations { font-size:14px; margin-bottom:2px; }
.leg-stations .time { font-weight:600; }
.leg-platform { font-size:11px; color:var(--text2); }

/* 换乘标签 */
.transfer-tag {
  display:inline-block; font-size:11px; font-weight:600;
  padding: 2px 8px; border-radius:4px; margin: 4px 0 6px 0;
}
.transfer-tag.tight { background:rgba(248,113,113,0.15); color:var(--red); }
.transfer-tag.moderate { background:rgba(251,146,60,0.15); color:var(--orange); }
.transfer-tag.relaxed { background:rgba(74,222,128,0.15); color:var(--green); }

/* 备注标签 */
.notes-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.note-tag {
  font-size:11px; padding:2px 7px; border-radius:4px;
  background: rgba(100,108,255,0.12); color:var(--accent);
}
.note-edit-btn {
  font-size:11px; padding:2px 7px; border-radius:4px;
  background: rgba(100,108,255,0.08); color:var(--text2);
  border:1px dashed var(--border); cursor:pointer;
}

/* ========== 弹窗 / 设置 ========== */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background: var(--card); border-radius: 16px 16px 0 0;
  width:100%; max-width:500px; max-height:85vh; overflow-y:auto;
  padding: 20px 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
}
.modal h2 { font-size:16px; margin-bottom:14px; }
.modal label { display:block; font-size:13px; color:var(--text2); margin:10px 0 4px; }
.modal input, .modal textarea, .modal select {
  width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);
  background: var(--bg); color:var(--text); font-size:14px;
}
.modal textarea { min-height:60px; resize:vertical; }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal-actions button {
  flex:1; padding:10px; border:none; border-radius:8px;
  font-size:14px; font-weight:600; cursor:pointer;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-secondary { background:var(--border); color:var(--text); }

/* 底部导航 */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(26,26,46,0.95); backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex; padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
  gap:8px;
}
.bottom-bar button {
  flex:1; padding:8px; border:none; border-radius:8px;
  background: var(--card); color:var(--text2); font-size:12px;
  cursor:pointer;
}
.bottom-bar button:active { background:var(--border); }

/* 时刻表编辑 */
.tt-section { margin-bottom:16px; }
.tt-section h3 { font-size:14px; color:var(--accent2); margin-bottom:6px; }
.tt-chips { display:flex; flex-wrap:wrap; gap:4px; }
.tt-chip {
  font-size:13px; padding:4px 10px; border-radius:6px;
  background:var(--bg); border:1px solid var(--border); color:var(--text);
}
.tt-chip .del { color:var(--red); margin-left:4px; cursor:pointer; }
.add-time-row { display:flex; gap:6px; margin-top:6px; }
.add-time-row input { flex:1; }
.add-time-row button {
  padding:8px 14px; border:none; border-radius:8px;
  background:var(--accent); color:#fff; font-size:13px; cursor:pointer;
}

/* 备注管理列表 */
.note-list-item {
  padding:10px; background:var(--bg); border-radius:8px;
  margin-bottom:6px; font-size:13px;
}
.note-list-item .key { color:var(--accent2); font-weight:600; margin-bottom:4px; }
.note-list-item .vals { color:var(--text2); }
.note-list-item .del-note {
  color:var(--red); font-size:12px; cursor:pointer; float:right;
}

body { padding-bottom: 70px; }
</style>
</head>
<body>

<!-- ========== 顶部 ========== -->
<div class="header">
  <h1 id="routeName">🚃 通勤ルート検索</h1>
  <div class="now" id="clock"></div>
  <div class="dir-toggle">
    <button class="dir-btn active" data-dir="forward" onclick="setDir('forward')">🏢 去程（出勤）</button>
    <button class="dir-btn" data-dir="backward" onclick="setDir('backward')">🏠 回程（帰宅）</button>
  </div>
  <button class="search-btn" onclick="doSearch()">🔍 查询路线</button>
</div>

<!-- ========== 结果 ========== -->
<div class="results" id="results">
  <div class="hint">点击上方「查询路线」按钮开始搜索</div>
</div>

<!-- ========== 备注编辑弹窗 ========== -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h2>📝 换乘备注</h2>
    <div id="noteModalLegInfo" style="font-size:13px;color:var(--accent2);margin-bottom:10px;"></div>
    <label>到达月台 (ホーム)</label>
    <input id="notePlatform" placeholder="例: 3番ホーム">
    <label>最佳车厢</label>
    <input id="noteCar" placeholder="例: 前から3両目">
    <label>最佳车门</label>
    <input id="noteDoor" placeholder="例: 2番ドア">
    <label>自由备注</label>
    <textarea id="noteMemo" placeholder="例: 左侧通道换乘更快"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeNoteModal()">取消</button>
      <button class="btn-primary" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<!-- ========== 设置弹窗 ========== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" id="settingsContent"></div>
</div>

<!-- ========== 时刻表编辑弹窗 ========== -->
<div class="modal-overlay" id="ttModal">
  <div class="modal" id="ttContent"></div>
</div>

<!-- ========== 备注管理弹窗 ========== -->
<div class="modal-overlay" id="notesListModal">
  <div class="modal" id="notesListContent"></div>
</div>

<!-- ========== 底部栏 ========== -->
<div class="bottom-bar">
  <button onclick="openSettings()">⚙️ 设置</button>
  <button onclick="openTTEditor()">🕐 时刻表</button>
  <button onclick="openNotesList()">📝 备注管理</button>
</div>

<script>
// ==============================================
// ===== 配置区域（替换为你的真实数据） =====
// ==============================================
const DEFAULT_CONFIG = {
  routeName: "我的通勤路线",        // ← 替换为你的路线名
  searchWindowStart: 6,              // 查询起始：当前时间 + 6分钟
  searchWindowEnd: 15,               // 查询结束：当前时间 + 15分钟
  direction: {
    forward: {                       // ← 去程
      legs: [
        {
          lineName: "○○线",         // ← 第1段线路名
          fromStation: "A站",       // ← 出发站
          toStation: "B站",         // ← 到达站(=第1换乘站)
          ridingMinutes: 15,         // ← 乘车时间(分钟)
          platformNumber: "2番ホーム", // ← 到达月台编号
          weekday: ["07:00","07:08","07:15","07:22","07:30","07:38","07:45","07:52","08:00","08:10","08:20","08:30","08:45","09:00"],
          holiday: ["07:10","07:30","07:50","08:10","08:30","09:00","09:30"]
        },
        {
          lineName: "△△线",         // ← 第2段线路名
          fromStation: "B站",
          toStation: "C站",
          ridingMinutes: 20,
          transferMinutes: 1,        // ← 在B站的最短换乘时间
          platformNumber: "5番ホーム",
          weekday: ["07:05","07:15","07:25","07:35","07:45","07:55","08:05","08:15","08:30","08:45","09:00","09:15","09:30"],
          holiday: ["07:20","07:40","08:00","08:20","08:40","09:00","09:30"]
        },
        {
          lineName: "□□线",         // ← 第3段线路名
          fromStation: "C站",
          toStation: "D站",          // ← 公司最近站
          ridingMinutes: 10,
          transferMinutes: 1,        // ← 在C站的最短换乘时间
          platformNumber: "3番ホーム",
          weekday: ["07:20","07:30","07:40","07:50","08:00","08:10","08:20","08:35","08:50","09:05","09:20","09:40","10:00"],
          holiday: ["07:30","08:00","08:30","09:00","09:30","10:00"]
        }
      ]
    },
    backward: {                      // ← 回程
      legs: [
        {
          lineName: "□□线",
          fromStation: "D站",
          toStation: "C站",
          ridingMinutes: 10,
          platformNumber: "1番ホーム",
          weekday: ["17:00","17:10","17:20","17:30","17:40","17:50","18:00","18:10","18:20","18:30","18:45","19:00","19:15","19:30"],
          holiday: ["17:00","17:30","18:00","18:30","19:00","19:30"]
        },
        {
          lineName: "△△线",
          fromStation: "C站",
          toStation: "B站",
          ridingMinutes: 20,
          transferMinutes: 1,
          platformNumber: "4番ホーム",
          weekday: ["17:05","17:15","17:25","17:35","17:45","17:55","18:05","18:15","18:30","18:45","19:00","19:20","19:40","20:00"],
          holiday: ["17:10","17:40","18:10","18:40","19:10","19:40","20:10"]
        },
        {
          lineName: "○○线",
          fromStation: "B站",
          toStation: "A站",
          ridingMinutes: 15,
          transferMinutes: 1,
          platformNumber: "6番ホーム",
          weekday: ["17:20","17:30","17:40","17:50","18:00","18:10","18:20","18:35","18:50","19:05","19:20","19:40","20:00","20:20"],
          holiday: ["17:30","18:00","18:30","19:00","19:30","20:00","20:30"]
        }
      ]
    }
  }
};

// ==============================================
// ===== 工具函数 =====
// ==============================================

// 时间字符串 "HH:MM" → 当天分钟数
function toMin(s) {
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}
// 分钟数 → "HH:MM"
function toStr(m) {
  const h = Math.floor(m / 60) % 24;
  const mm = m % 60;
  return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}
// 判断今天是否工作日
function isWeekday() {
  const d = new Date().getDay();
  return d >= 1 && d <= 5;
}
// 获取当前分钟数
function nowMin() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

// ==============================================
// ===== 数据持久化 =====
// ==============================================
const STORAGE_KEY = 'commuteConfig';
const NOTES_KEY = 'commuteNotes';

function loadConfig() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}
function saveConfig(cfg) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
}
function loadNotes() {
  const saved = localStorage.getItem(NOTES_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return {};
}
function saveNotes(notes) {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}
// 备注key: "方向|线路名|出发站|到达站"
function noteKey(dir, leg) {
  return `${dir}|${leg.lineName}|${leg.fromStation}|${leg.toStation}`;
}

let config = loadConfig();
let notes = loadNotes();
let currentDir = 'forward';
let countdownTimer = null;

// ==============================================
// ===== 方向切换 =====
// ==============================================
function setDir(dir) {
  currentDir = dir;
  document.querySelectorAll('.dir-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === dir);
  });
  document.getElementById('results').innerHTML = '<div class="hint">点击「查询路线」按钮搜索</div>';
}

// ==============================================
// ===== 核心搜索算法 =====
// ==============================================
function doSearch() {
  config = loadConfig();
  notes = loadNotes();
  const legs = config.direction[currentDir].legs;
  const wd = isWeekday();
  const now = nowMin();
  const winStart = now + config.searchWindowStart;
  const winEnd = now + config.searchWindowEnd;

  // 获取当前时刻表
  const getTT = (leg) => (wd ? leg.weekday : leg.holiday).map(toMin).sort((a,b)=>a-b);

  // 查找 >= target 的最早班次
  const findNext = (tt, target) => tt.find(t => t >= target) ?? null;

  // 查找所有窗口内第1段出发的方案
  const tt0 = getTT(legs[0]);
  let candidates = tt0.filter(t => t >= winStart && t <= winEnd);

  // 若窗口内无班次，向后找最近1班
  let fallback = false;
  if (candidates.length === 0) {
    const next = findNext(tt0, winStart);
    if (next !== null) {
      candidates = [next];
      fallback = true;
    }
  }

  if (candidates.length === 0) {
    document.getElementById('results').innerHTML = '<div class="hint">今天没有更多班次了 😴</div>';
    return;
  }

  // 为每个第1段出发时刻，推算完整方案
  const plans = [];
  for (const dep0 of candidates) {
    let valid = true;
    const planLegs = [];
    let arrPrev = dep0 + legs[0].ridingMinutes;
    planLegs.push({ dep: dep0, arr: arrPrev, leg: legs[0], transfer: null });

    for (let i = 1; i < legs.length; i++) {
      const leg = legs[i];
      const transferMin = leg.transferMinutes || 1;
      const earliest = arrPrev + transferMin;
      const tt = getTT(leg);
      const dep = findNext(tt, earliest);
      if (dep === null) { valid = false; break; }
      const arr = dep + leg.ridingMinutes;
      const wait = dep - arrPrev;
      planLegs.push({ dep, arr, leg, transfer: { wait, station: legs[i-1].toStation } });
      arrPrev = arr;
    }
    if (valid) {
      const totalDep = planLegs[0].dep;
      const totalArr = planLegs[planLegs.length - 1].arr;
      plans.push({ legs: planLegs, depMin: totalDep, arrMin: totalArr, total: totalArr - totalDep });
    }
  }

  if (plans.length === 0) {
    document.getElementById('results').innerHTML = '<div class="hint">无法在后续班次中找到可行方案</div>';
    return;
  }

  // 渲染结果
  let html = '';
  if (fallback) {
    const waitExtra = plans[0].depMin - winStart;
    html += `<div style="text-align:center;color:var(--orange);font-size:13px;padding:8px 0;">⏳ 窗口内无班次，下一班需等待约 ${waitExtra} 分钟</div>`;
  }

  plans.forEach((plan, pi) => {
    html += `<div class="plan-card" data-plan="${pi}">`;
    // 顶部：出发到达 + 总用时
    html += `<div class="plan-top">`;
    html += `<div class="plan-times">${toStr(plan.depMin)}<span>→</span>${toStr(plan.arrMin)}</div>`;
    const countdown = plan.depMin - nowMin();
    html += `<div class="plan-meta">`;
    html += `<div class="total">⏱ ${plan.total}分</div>`;
    html += `<div class="countdown" data-dep="${plan.depMin}">あと ${countdown}分</div>`;
    html += `</div></div>`;

    // 每段详情
    plan.legs.forEach((pl, li) => {
      // 换乘标签
      if (pl.transfer) {
        const w = pl.transfer.wait;
        const cls = w <= 1 ? 'tight' : w <= 2 ? 'moderate' : 'relaxed';
        const icon = w <= 1 ? '⚡' : w <= 2 ? '🚶' : '☕';
        html += `<div class="transfer-tag ${cls}">${icon} ${pl.transfer.station}で乗換 ${w}分</div>`;
      }
      html += `<div class="leg">`;
      html += `<div class="leg-dot"></div>`;
      html += `<div class="leg-info">`;
      html += `<div class="leg-line">${pl.leg.lineName}</div>`;
      html += `<div class="leg-stations"><span class="time">${toStr(pl.dep)}</span> ${pl.leg.fromStation} → <span class="time">${toStr(pl.arr)}</span> ${pl.leg.toStation}</div>`;
      if (pl.leg.platformNumber) {
        html += `<div class="leg-platform">📍 ${pl.leg.platformNumber}</div>`;
      }
      // 备注显示
      const nk = noteKey(currentDir, pl.leg);
      const n = notes[nk];
      html += `<div class="notes-tags">`;
      if (n) {
        if (n.car) html += `<span class="note-tag">🚃 ${n.car}</span>`;
        if (n.door) html += `<span class="note-tag">🚪 ${n.door}</span>`;
        if (n.platform) html += `<span class="note-tag">📍 ${n.platform}</span>`;
        if (n.memo) html += `<span class="note-tag">💬 ${n.memo}</span>`;
      }
      html += `<span class="note-edit-btn" onclick="openNoteModal('${currentDir}',${li})">✏️ 备注</span>`;
      html += `</div>`;
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  document.getElementById('results').innerHTML = html;
  startCountdown();
}

// ==============================================
// ===== 倒计时 =====
// ==============================================
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const now = nowMin();
    document.querySelectorAll('.countdown').forEach(el => {
      const dep = parseInt(el.dataset.dep);
      const left = dep - now;
      if (left <= 0) {
        el.textContent = '出発済み';
        el.style.color = 'var(--red)';
      } else {
        el.textContent = `あと ${left}分`;
      }
    });
  }, 15000); // 每15秒更新
}

// ==============================================
// ===== 备注弹窗 =====
// ==============================================
let editingNoteKey = '';
function openNoteModal(dir, legIdx) {
  const cfg = loadConfig();
  const leg = cfg.direction[dir].legs[legIdx];
  editingNoteKey = noteKey(dir, leg);
  const n = notes[editingNoteKey] || {};
  document.getElementById('noteModalLegInfo').textContent = `${leg.lineName}: ${leg.fromStation} → ${leg.toStation}`;
  document.getElementById('notePlatform').value = n.platform || leg.platformNumber || '';
  document.getElementById('noteCar').value = n.car || '';
  document.getElementById('noteDoor').value = n.door || '';
  document.getElementById('noteMemo').value = n.memo || '';
  document.getElementById('noteModal').classList.add('show');
}
function closeNoteModal() {
  document.getElementById('noteModal').classList.remove('show');
}
function saveNote() {
  notes[editingNoteKey] = {
    platform: document.getElementById('notePlatform').value.trim(),
    car: document.getElementById('noteCar').value.trim(),
    door: document.getElementById('noteDoor').value.trim(),
    memo: document.getElementById('noteMemo').value.trim()
  };
  saveNotes(notes);
  closeNoteModal();
  doSearch(); // 刷新显示
}

// ==============================================
// ===== 设置弹窗 =====
// ==============================================
function openSettings() {
  config = loadConfig();
  let html = '<h2>⚙️ 设置</h2>';
  html += '<label>查询窗口起始 (当前时间 + X分)</label>';
  html += `<input type="number" id="setWinStart" value="${config.searchWindowStart}" min="0" max="60">`;
  html += '<label>查询窗口结束 (当前时间 + X分)</label>';
  html += `<input type="number" id="setWinEnd" value="${config.searchWindowEnd}" min="1" max="120">`;

  ['forward','backward'].forEach(dir => {
    const dirLabel = dir === 'forward' ? '去程' : '回程';
    config.direction[dir].legs.forEach((leg, i) => {
      if (leg.transferMinutes !== undefined) {
        html += `<label>${dirLabel} - ${leg.fromStation}での最短換乗時間 (分)</label>`;
        html += `<input type="number" class="transfer-input" data-dir="${dir}" data-idx="${i}" value="${leg.transferMinutes}" min="0" max="30">`;
      }
    });
  });

  html += '<div class="modal-actions">';
  html += '<button class="btn-secondary" onclick="closeSettings()">取消</button>';
  html += '<button class="btn-primary" onclick="saveSettings()">保存</button>';
  html += '</div>';
  document.getElementById('settingsContent').innerHTML = html;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}
function saveSettings() {
  config.searchWindowStart = parseInt(document.getElementById('setWinStart').value) || 6;
  config.searchWindowEnd = parseInt(document.getElementById('setWinEnd').value) || 15;
  document.querySelectorAll('.transfer-input').forEach(inp => {
    const dir = inp.dataset.dir;
    const idx = parseInt(inp.dataset.idx);
    config.direction[dir].legs[idx].transferMinutes = parseInt(inp.value) || 1;
  });
  saveConfig(config);
  closeSettings();
}

// ==============================================
// ===== 时刻表编辑弹窗 =====
// ==============================================
function openTTEditor() {
  config = loadConfig();
  let html = '<h2>🕐 时刻表编辑</h2>';
  ['forward','backward'].forEach(dir => {
    const dirLabel = dir === 'forward' ? '🏢 去程' : '🏠 回程';
    html += `<h3 style="color:var(--accent);margin:12px 0 6px;">${dirLabel}</h3>`;
    config.direction[dir].legs.forEach((leg, li) => {
      html += `<div class="tt-section">`;
      html += `<h3>${leg.lineName}: ${leg.fromStation}発</h3>`;
      ['weekday','holiday'].forEach(dayType => {
        const label = dayType === 'weekday' ? '平日' : '土休日';
        const times = leg[dayType] || [];
        html += `<div style="margin:4px 0 2px;font-size:12px;color:var(--text2);">${label}:</div>`;
        html += `<div class="tt-chips" id="ttchips_${dir}_${li}_${dayType}">`;
        times.forEach((t, ti) => {
          html += `<span class="tt-chip">${t}<span class="del" onclick="removeTT('${dir}',${li},'${dayType}',${ti})">×</span></span>`;
        });
        html += `</div>`;
        html += `<div class="add-time-row">`;
        html += `<input type="time" id="addtt_${dir}_${li}_${dayType}">`;
        html += `<button onclick="addTT('${dir}',${li},'${dayType}')">追加</button>`;
        html += `</div>`;
      });
      html += `</div>`;
    });
  });
  html += '<div class="modal-actions">';
  html += '<button class="btn-primary" onclick="closeTTEditor()">完了</button>';
  html += '</div>';
  document.getElementById('ttContent').innerHTML = html;
  document.getElementById('ttModal').classList.add('show');
}
function closeTTEditor() {
  document.getElementById('ttModal').classList.remove('show');
}
function addTT(dir, li, dayType) {
  const inp = document.getElementById(`addtt_${dir}_${li}_${dayType}`);
  if (!inp.value) return;
  const t = inp.value.substring(0,5);
  config.direction[dir].legs[li][dayType].push(t);
  config.direction[dir].legs[li][dayType].sort();
  saveConfig(config);
  openTTEditor(); // 刷新
}
function removeTT(dir, li, dayType, ti) {
  config.direction[dir].legs[li][dayType].splice(ti, 1);
  saveConfig(config);
  openTTEditor(); // 刷新
}

// ==============================================
// ===== 备注管理弹窗 =====
// ==============================================
function openNotesList() {
  notes = loadNotes();
  let html = '<h2>📝 备注管理</h2>';
  const keys = Object.keys(notes);
  if (keys.length === 0) {
    html += '<div style="color:var(--text2);padding:20px 0;text-align:center;">まだ備考はありません</div>';
  } else {
    keys.forEach(k => {
      const n = notes[k];
      const parts = k.split('|');
      html += `<div class="note-list-item">`;
      html += `<span class="del-note" onclick="deleteNote('${k}')">🗑 削除</span>`;
      html += `<div class="key">${parts[1]}: ${parts[2]} → ${parts[3]}</div>`;
      const vals = [];
      if (n.platform) vals.push('📍 ' + n.platform);
      if (n.car) vals.push('🚃 ' + n.car);
      if (n.door) vals.push('🚪 ' + n.door);
      if (n.memo) vals.push('💬 ' + n.memo);
      html += `<div class="vals">${vals.join(' | ')}</div>`;
      html += `</div>`;
    });
  }
  html += '<div class="modal-actions"><button class="btn-primary" onclick="closeNotesList()">閉じる</button></div>';
  document.getElementById('notesListContent').innerHTML = html;
  document.getElementById('notesListModal').classList.add('show');
}
function closeNotesList() {
  document.getElementById('notesListModal').classList.remove('show');
}
function deleteNote(k) {
  delete notes[k];
  saveNotes(notes);
  openNotesList();
}

// ==============================================
// ===== 时钟 & 初始化 =====
// ==============================================
function updateClock() {
  const n = new Date();
  const day = ['日','月','火','水','木','金','土'][n.getDay()];
  const wd = isWeekday() ? '平日' : '土休日';
  document.getElementById('clock').textContent =
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}(${day}) ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} ─ ${wd}ダイヤ`;
}
setInterval(updateClock, 10000);
updateClock();

// 路线名
document.getElementById('routeName').textContent = '🚃 ' + config.routeName;

// ==============================================
// ===== Service Worker (离线支持) =====
// ==============================================
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
